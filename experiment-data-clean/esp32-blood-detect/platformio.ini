; PlatformIO build for the ESP32 blood-detect inference firmware.
; Self-contained: builds main.cpp + the generated headers in this folder.
[platformio]
src_dir = .

[env:esp32doit-devkit-v1]
platform      = espressif32
board         = esp32doit-devkit-v1
framework     = arduino
monitor_speed = 115200
monitor_rts   = 0
monitor_dtr   = 0
lib_deps =
    adafruit/Adafruit HDC302x@^1.0.3
